# Updated API configuration with newer, cheaper models
openai:
  api_key: ${OPENAI_API_KEY}  # Loaded from environment
  models:
    - gpt-4o-mini      # Cheapest model - add this first!
    - gpt-3.5-turbo    # Second cheapest
    - gpt-4o           # More expensive but capable
    - gpt-4            # Most expensive
  rate_limit: 60  # requests per minute

anthropic:
  api_key: ${ANTHROPIC_API_KEY}
  models:
    - claude-3-opus
    - claude-3-sonnet
    - claude-3-haiku  # Anthropic's cheaper option
  
grok:
  api_key: ${GROK_API_KEY}
  models:
    - grok-beta        # Free tier model
    - grok-2-1212      # Latest Grok 2 model
    - grok-2-mini-beta # Smaller, faster Grok 2 mini
  rate_limit: 60

groq:
  api_key: ${GROQ_API_KEY}
  models:
    - llama-3.1-8b-instant
    - gemma2-9b-it
    - deepseek-r1-distill-llama-70b
    # - mixtral-8x7b-32768
    # - llama-3.1-70b-versatile
    # - llama-3.2-11b-text-preview
  rate_limit: 30